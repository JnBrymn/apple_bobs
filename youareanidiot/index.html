<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You Are An Idiot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: Impact, sans-serif;
      overflow: hidden;
    }
    .face {
      font-size: 80px;
      margin: 20px;
      animation: blink 0.3s infinite alternate, spin 4s linear infinite;
    }
    .text {
      font-size: 48px;
      color: #ff0;
      text-shadow: 0 0 20px #ff0;
      animation: flash 0.5s infinite alternate;
    }
    @keyframes blink {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0.8; transform: scale(1.1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes flash {
      from { color: #ff0; }
      to { color: #f0f; }
    }
    .faces { display: flex; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="faces">
    <span class="face">😈</span>
    <span class="face">😈</span>
    <span class="face">😈</span>
  </div>
  <p class="text">YOU ARE AN IDIOT!</p>
  <p class="text">YOU ARE AN IDIOT!</p>
  <p class="text">YOU ARE AN IDIOT!</p>

  <script>
    // Classic prank vibe: try to open more when they click (browsers block most popups now, but we try!)
    document.body.onclick = function() {
      try {
        window.open('index.html', '_blank', 'width=400,height=300');
      } catch (e) {}
    };
    // Silly sound beep using Web Audio if they click
    var audioCtx = null;
    document.body.ontouchstart = document.body.onclick;
    function beep() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.connect(g);
      g.connect(audioCtx.destination);
      o.frequency.value = 440;
      g.gain.value = 0.1;
      o.start();
      o.stop(audioCtx.currentTime + 0.1);
    }
    setInterval(beep, 500);
  </script>
</body>
</html>
